name: Generate Commentary

on:
  schedule:
    # Runs at 07:45, 17:45, 21:45 UTC daily (just before typical kickoff windows)
    - cron: '45 07 * * *'
#    - cron: '45 17 * * *'
    - cron: '45 21 * * *'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate commentary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-commentary.js

      - name: Commit commentary if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/commentary.json
          git diff --staged --quiet || git commit -m "chore: update commentary [skip ci]"
          git push