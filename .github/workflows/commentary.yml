jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate commentary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-commentary.js

      # - name: Commit commentary if changed
      #   run: |
      #     git config user.name  "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     git add public/commentary.json
      #     git diff --staged --quiet || git commit -m "chore: update commentary [skip ci]"
      #     git push

      - name: Commit commentary if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit to main
          git add public/commentary.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update commentary [skip ci]"
          git push origin main
          
          # Switch to live and copy to root
          git fetch origin live
          git checkout live
          cp public/commentary.json commentary.json
          git add commentary.json
          git commit -m "chore: update commentary [skip ci]"
          git push origin live
          
          # Switch back to main
          git checkout main
